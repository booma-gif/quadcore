<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiments - CitySimulate</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <header class="navbar">
        <div style="display: flex; align-items: center; gap: 30px;">
            <a href="index.html" class="logo">CitySimulate</a>
            <div class="nav-links">
                <nav>
                    <a href="dashboard.html">Simulator</a>
                    <a href="experiment.html" class="active">Experiments</a>
                    <a href="analytics.html">Analytics</a>
                    <a href="compare.html">Compare</a>
                    <a href="docs.html">Docs</a>
                </nav>
            </div>
        </div>
        <div class="nav-right" id="nav-user"></div>
    </header>

    <div class="container section mt-2">
        <div class="flex-between mb-2">
            <h2>Policy Experiments Builder</h2>
            <button class="btn btn-primary" onclick="document.getElementById('builder-form').classList.toggle('active')">
                + New Experiment
            </button>
        </div>

        <div id="builder-form" class="card mb-3" style="display: none;">
            <h3>Create New Experiment</h3>
            <form id="expForm">
                <div class="two-column" style="gap:20px;">
                    <div>
                        <div class="input-group">
                            <label>Experiment Name</label>
                            <input type="text" id="expName" required placeholder="Q3 Transport Overhaul">
                        </div>
                        <div class="input-group">
                            <label>Target City</label>
                            <select id="expCity">
                                <option value="1">London</option>
                                <option value="2">New York</option>
                                <option value="3">Tokyo</option>
                                <option value="4">Mumbai</option>
                                <option value="5">Lagos</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Description</label>
                            <textarea id="expDesc" rows="4" placeholder="Goal: Reduce congestion without hurting economic output."></textarea>
                        </div>
                    </div>
                    <div>
                         <label class="text-secondary mb-1" style="display:block;">Select Modules to Include</label>
                         <div id="module-toggles" style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                             <!-- Populated by JS -->
                         </div>
                         <button type="submit" class="btn btn-primary btn-block mt-2">Save Parameters</button>
                    </div>
                </div>
            </form>
        </div>

        <h3>Saved Experiments</h3>
        <div id="exp-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; margin-top: 20px;">
            <div class="text-center" style="grid-column: 1/-1;">Loading experiments...</div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/policies.js"></script>
    <script src="js/ui.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
             await DB.requireAuth();

             // Populate checkboxes
             const toggleContainer = document.getElementById('module-toggles');
             for(const key in PoliciesConfig) {
                 toggleContainer.innerHTML += `
                     <label style="display:flex; align-items:center; gap:10px; padding:10px; background:var(--bg-primary); border-radius:var(--radius-button); border:1px solid var(--border-color); cursor:pointer;">
                         <input type="checkbox" name="modules" value="${key}" checked>
                         ${PoliciesConfig[key].icon} ${PoliciesConfig[key].name}
                     </label>
                 `;
             }

             await loadExperiments();
        });

        document.getElementById('expForm').addEventListener('submit', async (e) => {
             e.preventDefault();
             await DB.saveSimulation({
                 name: document.getElementById('expName').value,
                 city_id: document.getElementById('expCity').value,
                 mode: 'experiment',
                 policy_params: getDefaultParams(), // placeholder, ideally would read from a builder UI
                 results: {}
             });
             document.getElementById('builder-form').style.display = 'none';
             await loadExperiments();
        });

        async function loadExperiments() {
             const list = document.getElementById('exp-list');
             const { data, error } = await DB.getSimulations();
             
             if(error || !data || data.length === 0) {
                 list.innerHTML = `<div class="card text-center" style="grid-column:1/-1;">No experiments saved yet.</div>`;
                 return;
             }

             list.innerHTML = '';
             data.forEach(exp => {
                 list.innerHTML += `
                     <div class="card">
                         <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
                             <h4 style="color:var(--color-primary)">${exp.name}</h4>
                             <span class="badge">${exp.cities?.name || 'City'}</span>
                         </div>
                         <p class="text-secondary" style="font-size:0.85rem; margin-bottom:15px;">
                            Created: ${new Date(exp.created_at).toLocaleDateString()}
                         </p>
                         <div style="display:flex; gap:10px;">
                             <a href="dashboard.html" class="btn btn-primary" style="flex:1;">Load</a>
                             <button class="btn btn-ghost" style="flex:1;">Delete</button>
                         </div>
                     </div>
                 `;
             });
        }
    </script>
</body>
</html>
